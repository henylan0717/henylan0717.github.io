<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢光工作記錄看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .task-card {
            cursor: grab;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .task-card:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        .task-card.dragging {
            opacity: 0.5;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .column-drop-zone {
            min-height: 150px;
            transition: background-color 0.2s ease;
        }
        .column-drop-zone.drag-over {
            background-color: #e2e8f0;
            border: 2px dashed #94a3b8;
            border-radius: 0.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 日曆網格樣式 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- 頂部導覽 -->
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-brand-500 text-white p-2 rounded-lg">
                <i data-lucide="calendar-days"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">日曆工作看板</h1>
        </div>
        
        <button onclick="exportReport()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors text-sm">
            <i data-lucide="clipboard-copy" class="w-4 h-4"></i>
            <span class="hidden sm:inline">匯出單日報表</span>
        </button>
    </header>

    <!-- 主要內容區 (側邊日曆 + 右側看板) -->
    <main class="flex-1 overflow-auto p-4 sm:p-6 flex flex-col lg:flex-row gap-6">
        
        <!-- 左側：日曆與數據 -->
        <aside class="w-full lg:w-80 shrink-0 flex flex-col gap-6">
            <!-- 日曆模組 -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="calendar-month-year" class="font-bold text-slate-700">2023年 10月</h2>
                    <button onclick="changeMonth(1)" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
                
                <div class="calendar-grid text-center text-xs font-medium text-slate-400 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                
                <div id="calendar-days" class="calendar-grid">
                    <!-- 日曆天數由 JS 生成 -->
                </div>
                
                <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                    <button onclick="goToToday()" class="text-xs font-medium text-brand-600 hover:text-brand-700 bg-brand-50 px-3 py-1.5 rounded">
                        回到今天
                    </button>
                    <div class="flex items-center gap-2 text-xs text-slate-500">
                        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span> 待辦</span>
                        <span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-brand-500"></span> 完成</span>
                    </div>
                </div>
            </div>

            <!-- 選定日期的進度追蹤 -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-4 h-4 text-brand-500"></i> 單日任務進度
                </h3>
                <div class="flex justify-between text-2xl font-bold mb-1">
                    <span id="progress-text" class="text-brand-600">0%</span>
                    <span id="task-count-text" class="text-slate-400 text-sm font-medium self-end mb-1">0 / 0 項</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                    <div id="progress-bar" class="bg-brand-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <!-- 右側：任務看板 -->
        <section class="flex-1 flex flex-col min-w-0">
            
            <!-- 日期標題與輸入區 -->
            <div class="mb-6">
                <h2 id="selected-date-title" class="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <!-- 日期標題由 JS 生成 -->
                </h2>
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col xl:flex-row gap-3">
                    <div class="flex-1 flex flex-col gap-2">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="plus-circle" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input type="text" id="task-input" placeholder="這天需要做些什麼？ (按 Enter 快速新增)" 
                                   class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-colors">
                        </div>
                        <textarea id="task-desc-input" placeholder="任務詳細內容或備註 (選填)..." class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all resize-none h-10 focus:h-20 text-sm no-scrollbar"></textarea>
                    </div>
                    
                    <div class="flex gap-3 h-[46px] mt-1 xl:mt-0 shrink-0">
                        <select id="category-input" class="px-4 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 font-medium text-slate-700 cursor-pointer">
                            <!-- 分類由 JS 生成 -->
                        </select>
                        <button onclick="openCategoryModal()" class="px-3 bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 flex items-center justify-center" title="管理工作分類">
                            <i data-lucide="settings-2" class="w-5 h-5"></i>
                        </button>
                        <button onclick="addTask()" class="bg-brand-500 hover:bg-brand-600 text-white px-6 rounded-lg font-medium transition-colors shadow-sm shadow-brand-500/30 whitespace-nowrap">
                            新增任務
                        </button>
                    </div>
                </div>
            </div>

            <!-- 看板區 -->
            <div class="flex flex-col md:flex-row gap-4 lg:gap-6 flex-1 min-h-0">
                <!-- 待辦 (To Do) -->
                <div class="flex-1 flex flex-col bg-slate-100 rounded-xl overflow-hidden border border-slate-200">
                    <div class="p-3 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center shrink-0">
                        <h3 class="font-bold text-slate-700 flex items-center gap-2 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span> 待辦 (To Do)
                        </h3>
                        <span id="count-todo" class="bg-slate-200 text-slate-600 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="todo" data-status="todo"></div>
                </div>

                <!-- 進行中 (In Progress) -->
                <div class="flex-1 flex flex-col bg-blue-50 rounded-xl overflow-hidden border border-blue-100">
                    <div class="p-3 border-b border-blue-100 bg-white/50 flex justify-between items-center shrink-0">
                        <h3 class="font-bold text-blue-800 flex items-center gap-2 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-blue-500"></span> 進行中 (Doing)
                        </h3>
                        <span id="count-inprogress" class="bg-blue-200 text-blue-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="inprogress" data-status="inprogress"></div>
                </div>

                <!-- 已完成 (Done) -->
                <div class="flex-1 flex flex-col bg-brand-50 rounded-xl overflow-hidden border border-brand-100">
                    <div class="p-3 border-b border-brand-100 bg-white/50 flex justify-between items-center shrink-0">
                        <h3 class="font-bold text-brand-800 flex items-center gap-2 text-sm">
                            <span class="w-2.5 h-2.5 rounded-full bg-brand-500"></span> 已完成 (Done)
                        </h3>
                        <span id="count-done" class="bg-brand-200 text-brand-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="done" data-status="done"></div>
                </div>
            </div>
            
        </section>
    </main>

    <!-- 分類管理 Modal (維持原本功能) -->
    <div id="category-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="category-modal-content">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="tags" class="w-5 h-5 text-brand-500"></i> 管理工作分類
                </h3>
                <button onclick="closeCategoryModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto max-h-[50vh]">
                <ul id="category-list" class="flex flex-col gap-2"></ul>
            </div>
            <div class="p-6 border-t border-slate-100 bg-slate-50">
                <h4 class="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> 新增分類
                </h4>
                <div class="flex flex-col gap-3">
                    <input type="text" id="new-category-name" placeholder="輸入分類名稱" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm">
                    <div class="flex gap-3 items-center">
                        <span class="text-xs font-medium text-slate-500">選擇顏色：</span>
                        <div id="color-picker" class="flex gap-2 flex-wrap"></div>
                    </div>
                    <button onclick="addNewCategory()" class="w-full mt-2 bg-slate-800 hover:bg-slate-900 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
                        新增分類
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 編輯任務 Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="edit-modal-content">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="edit" class="w-5 h-5 text-brand-500"></i> 編輯任務
                </h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">任務標題</label>
                    <input type="text" id="edit-task-title" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">工作分類</label>
                    <select id="edit-task-category" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 cursor-pointer">
                        <!-- 動態生成 -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">詳細內容</label>
                    <textarea id="edit-task-desc" rows="4" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 bg-slate-100 rounded-lg transition-colors">取消</button>
                <button onclick="saveEditedTask()" class="px-4 py-2 text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors shadow-sm">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示 -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50">
        <i data-lucide="check-circle-2" class="text-brand-400"></i>
        <span id="toast-message">訊息</span>
    </div>

    <script>
        // 日期與狀態管理
        let tasks = [];
        let categories = [];
        const STORAGE_KEY = 'daily_tasks_data_v2'; // 更新 key 避免舊版格式衝突
        const STORAGE_KEY_CATS = 'daily_tasks_categories';
        
        let displayDate = new Date(); // 日曆顯示的月份
        let selectedDateStr = getLocalISODate(new Date()); // 當前選中編輯的日期 (YYYY-MM-DD)

        const colorThemes = [
            { value: 'purple', class: 'bg-purple-100 text-purple-700 border-purple-200', dotClass: 'bg-purple-500 ring-purple-500' },
            { value: 'blue', class: 'bg-blue-100 text-blue-700 border-blue-200', dotClass: 'bg-blue-500 ring-blue-500' },
            { value: 'emerald', class: 'bg-emerald-100 text-emerald-700 border-emerald-200', dotClass: 'bg-emerald-500 ring-emerald-500' },
            { value: 'amber', class: 'bg-amber-100 text-amber-700 border-amber-200', dotClass: 'bg-amber-500 ring-amber-500' },
            { value: 'rose', class: 'bg-rose-100 text-rose-700 border-rose-200', dotClass: 'bg-rose-500 ring-rose-500' },
            { value: 'slate', class: 'bg-slate-100 text-slate-700 border-slate-200', dotClass: 'bg-slate-500 ring-slate-500' }
        ];
        let selectedNewCategoryColor = colorThemes[0];

        // 取得本地時區的 YYYY-MM-DD 字串
        function getLocalISODate(dateObj) {
            const tzOffset = dateObj.getTimezoneOffset() * 60000;
            return new Date(dateObj - tzOffset).toISOString().split('T')[0];
        }

        // 初始化
        function init() {
            lucide.createIcons();
            loadCategories();
            loadData();
            
            document.getElementById('task-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') addTask();
            });
            setupDragAndDrop();
        }

        // 資料讀取與轉移
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { tasks = JSON.parse(saved); } catch (e) { tasks = []; }
            } else {
                // 嘗試讀取舊版資料並進行轉移 (加入 date 屬性)
                const oldSaved = localStorage.getItem('daily_tasks_data');
                if (oldSaved) {
                    try {
                        const oldTasks = JSON.parse(oldSaved);
                        tasks = oldTasks.map(t => ({
                            ...t,
                            date: t.date || getLocalISODate(new Date(t.timestamp || Date.now()))
                        }));
                        saveData();
                    } catch (e) { tasks = []; }
                }
            }
            refreshView();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            refreshView();
        }

        // 畫面刷新總控
        function refreshView() {
            renderCalendar();
            updateUI();
        }

        // --- 日曆功能 ---
        function changeMonth(offset) {
            displayDate.setMonth(displayDate.getMonth() + offset);
            renderCalendar();
        }

        function goToToday() {
            displayDate = new Date();
            selectedDateStr = getLocalISODate(displayDate);
            refreshView();
        }

        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            updateUI();
            renderCalendar(); // 更新選中狀態
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            grid.innerHTML = '';
            
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById('calendar-month-year').textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = getLocalISODate(new Date());

            // 填充上個月的空白
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-2"></div>`;
            }

            // 渲染當月天數
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isSelected = dateStr === selectedDateStr;
                const isToday = dateStr === todayStr;
                
                // 計算該日的任務狀況 (產生小點點)
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const doneTasks = dayTasks.filter(t => t.status === 'done');
                const hasTasks = dayTasks.length > 0;
                const allDone = hasTasks && (doneTasks.length === dayTasks.length);

                let btnClass = 'p-1 cursor-pointer flex flex-col items-center justify-center rounded-lg transition-all min-h-[44px] hover:bg-slate-100 ';
                let textClass = 'text-slate-700 font-medium text-sm ';
                
                if (isSelected) {
                    btnClass = 'p-1 cursor-pointer flex flex-col items-center justify-center rounded-lg transition-all min-h-[44px] bg-brand-500 shadow-md shadow-brand-500/30 ';
                    textClass = 'text-white font-bold text-sm ';
                } else if (isToday) {
                    btnClass += 'bg-brand-50 ring-1 ring-inset ring-brand-200 ';
                    textClass = 'text-brand-700 font-bold text-sm ';
                }

                let dotHtml = '';
                if (hasTasks) {
                    const dotColor = isSelected ? 'bg-white' : (allDone ? 'bg-brand-500' : 'bg-slate-300');
                    dotHtml = `<div class="w-1.5 h-1.5 rounded-full mt-1 ${dotColor}"></div>`;
                }

                const cell = document.createElement('div');
                cell.className = btnClass;
                cell.onclick = () => selectDate(dateStr);
                cell.innerHTML = `<span class="${textClass}">${i}</span>${dotHtml}`;
                grid.appendChild(cell);
            }
        }

        // --- 看板與任務功能 ---
        function updateUI() {
            // 更新右側日期標題
            const dateObj = new Date(selectedDateStr);
            const weekday = ['日', '一', '二', '三', '四', '五', '六'][dateObj.getDay()];
            const titleDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
            
            let titlePrefix = '';
            if (selectedDateStr === getLocalISODate(new Date())) titlePrefix = '✨ 今天 - ';
            document.getElementById('selected-date-title').innerHTML = `${titlePrefix}${titleDate} <span class="text-slate-400 text-lg font-normal ml-2">(星期${weekday})</span>`;

            // 過濾出選定日期的任務
            const currentTasks = tasks.filter(t => t.date === selectedDateStr);
            
            const columns = {
                todo: document.getElementById('todo'),
                inprogress: document.getElementById('inprogress'),
                done: document.getElementById('done')
            };

            Object.values(columns).forEach(col => col.innerHTML = '');
            let counts = { todo: 0, inprogress: 0, done: 0 };

            // 排序並渲染
            const sortedTasks = [...currentTasks].sort((a, b) => b.timestamp - a.timestamp);
            sortedTasks.forEach(task => {
                if (columns[task.status]) {
                    counts[task.status]++;
                    columns[task.status].appendChild(createTaskElement(task));
                }
            });

            // 更新計數器
            document.getElementById('count-todo').textContent = counts.todo;
            document.getElementById('count-inprogress').textContent = counts.inprogress;
            document.getElementById('count-done').textContent = counts.done;

            // 更新選定日期的進度條
            const totalTasks = currentTasks.length;
            const doneTasks = counts.done;
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const taskCountText = document.getElementById('task-count-text');
            
            taskCountText.textContent = `${doneTasks} / ${totalTasks} 項`;
            if (totalTasks === 0) {
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
            } else {
                const percentage = Math.round((doneTasks / totalTasks) * 100);
                progressBar.style.width = percentage + '%';
                progressText.textContent = percentage + '%';
            }

            lucide.createIcons();
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const descInput = document.getElementById('task-desc-input');
            const category = document.getElementById('category-input').value;
            const text = input.value.trim();
            const desc = descInput ? descInput.value.trim() : '';
            
            if (text === '') { showToast('請輸入任務名稱！', false); return; }

            tasks.push({
                id: Math.random().toString(36).substr(2, 9),
                text: text,
                description: desc,
                category: category,
                status: 'todo',
                date: selectedDateStr, // 綁定到當前選擇的日期
                timestamp: Date.now()
            });

            input.value = '';
            if (descInput) descInput.value = '';
            saveData();
            showToast('已新增到 ' + selectedDateStr);
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveData();
        }

        function updateTaskStatus(id, newStatus) {
            const taskIndex = tasks.findIndex(task => task.id === id);
            if (taskIndex !== -1 && tasks[taskIndex].status !== newStatus) {
                tasks[taskIndex].status = newStatus;
                saveData();
            }
        }

        function createTaskElement(task) {
            const card = document.createElement('div');
            card.className = 'task-card bg-white p-3 rounded-lg shadow-sm border border-slate-200 mb-2.5 flex flex-col gap-2 group relative';
            card.draggable = true;
            card.dataset.id = task.id;

            const catInfo = categories.find(c => c.name === task.category);
            const colorClass = catInfo ? catInfo.colorClass : 'bg-slate-100 text-slate-700 border-slate-200';

            const statusButtons = `
                <div class="flex gap-1 mt-1 sm:hidden border-t pt-2 border-slate-100">
                    ${task.status !== 'todo' ? `<button onclick="updateTaskStatus('${task.id}', 'todo')" class="flex-1 text-xs py-1 rounded bg-slate-100 text-slate-600">待辦</button>` : ''}
                    ${task.status !== 'inprogress' ? `<button onclick="updateTaskStatus('${task.id}', 'inprogress')" class="flex-1 text-xs py-1 rounded bg-blue-50 text-blue-600">進行</button>` : ''}
                    ${task.status !== 'done' ? `<button onclick="updateTaskStatus('${task.id}', 'done')" class="flex-1 text-xs py-1 rounded bg-brand-50 text-brand-600">完成</button>` : ''}
                </div>
            `;
            
            // 處理內容換行與防範 XSS
            const descHtml = task.description ? `<p class="text-xs text-slate-500 mt-0.5 whitespace-pre-wrap line-clamp-3 bg-slate-50 p-2 rounded">${task.description.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start gap-2">
                    <span class="text-[10px] font-semibold px-2 py-0.5 rounded border ${colorClass}">${task.category}</span>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 sm:opacity-100 transition-opacity">
                        <button onclick="openEditModal('${task.id}')" class="text-slate-400 hover:text-blue-500 p-0.5" title="編輯任務">
                            <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                        </button>
                        <button onclick="deleteTask('${task.id}')" class="text-slate-400 hover:text-red-500 p-0.5" title="刪除任務">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-sm text-slate-700 font-medium leading-snug break-words ${task.status === 'done' ? 'line-through text-slate-400' : ''}">${task.text}</p>
                ${descHtml}
                ${statusButtons}
            `;

            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', task.id);
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => card.classList.add('dragging'), 0);
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                document.querySelectorAll('.column-drop-zone').forEach(zone => zone.classList.remove('drag-over'));
            });

            return card;
        }

        function setupDragAndDrop() {
            document.querySelectorAll('.column-drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', e => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const taskId = e.dataTransfer.getData('text/plain');
                    if (taskId && zone.dataset.status) updateTaskStatus(taskId, zone.dataset.status);
                });
            });
        }

        // --- 分類管理 (與舊版相同邏輯) ---
        function loadCategories() {
            const saved = localStorage.getItem(STORAGE_KEY_CATS);
            if (saved) {
                try { categories = JSON.parse(saved); } catch (e) { initDefaultCategories(); }
            } else { initDefaultCategories(); }
            renderCategorySelect();
        }

        function initDefaultCategories() {
            categories = [
                { id: 'cat_1', name: '視覺設計', colorClass: colorThemes.find(c => c.value === 'purple').class },
                { id: 'cat_2', name: '網頁開發', colorClass: colorThemes.find(c => c.value === 'blue').class },
                { id: 'cat_3', name: '專案溝通', colorClass: colorThemes.find(c => c.value === 'amber').class },
                { id: 'cat_4', name: '日常行政', colorClass: colorThemes.find(c => c.value === 'emerald').class }
            ];
            localStorage.setItem(STORAGE_KEY_CATS, JSON.stringify(categories));
        }

        function renderCategorySelect() {
            const select = document.getElementById('category-input');
            select.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.name; opt.textContent = cat.name;
                select.appendChild(opt);
            });
        }

        function openCategoryModal() {
            renderCategoryList(); renderColorPicker();
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('category-modal-content');
            modal.classList.remove('hidden'); void modal.offsetWidth;
            modal.classList.remove('opacity-0'); content.classList.remove('scale-95');
            lucide.createIcons();
        }

        function closeCategoryModal() {
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('category-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function renderCategoryList() {
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            categories.forEach(cat => {
                list.innerHTML += `
                    <li class="flex justify-between items-center p-3 rounded-lg border border-slate-200 bg-white shadow-sm">
                        <span class="text-xs font-semibold px-2.5 py-1.5 rounded-md border ${cat.colorClass}">${cat.name}</span>
                        <button onclick="deleteCategory('${cat.id}')" class="text-slate-400 hover:text-red-500 p-1.5 transition-colors rounded-md hover:bg-red-50"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </li>`;
            });
            lucide.createIcons();
        }

        function renderColorPicker() {
            const picker = document.getElementById('color-picker');
            picker.innerHTML = '';
            colorThemes.forEach(theme => {
                const isSelected = selectedNewCategoryColor.value === theme.value;
                const ringClass = isSelected ? 'ring-2 ring-offset-2' : '';
                const btn = document.createElement('button');
                btn.className = `w-6 h-6 rounded-full cursor-pointer transition-all hover:scale-110 ${theme.dotClass.split(' ')[0]} ${isSelected ? theme.dotClass.split(' ')[1] + ' ' + ringClass : ''}`;
                btn.onclick = () => { selectedNewCategoryColor = theme; renderColorPicker(); };
                picker.appendChild(btn);
            });
        }

        function addNewCategory() {
            const name = document.getElementById('new-category-name').value.trim();
            if (!name) return showToast('請輸入分類名稱！', false);
            if (categories.some(c => c.name === name)) return showToast('此分類名稱已存在！', false);
            
            categories.push({ id: 'cat_' + Math.random().toString(36).substr(2, 9), name: name, colorClass: selectedNewCategoryColor.class });
            localStorage.setItem(STORAGE_KEY_CATS, JSON.stringify(categories));
            renderCategorySelect(); renderCategoryList();
            document.getElementById('new-category-name').value = '';
            showToast('分類新增成功！'); updateUI();
        }

        function deleteCategory(id) {
            if (categories.length <= 1) return showToast('請至少保留一個分類！', false);
            categories = categories.filter(c => c.id !== id);
            localStorage.setItem(STORAGE_KEY_CATS, JSON.stringify(categories));
            renderCategorySelect(); renderCategoryList(); updateUI(); showToast('分類已刪除');
        }

        // --- 編輯任務功能 ---
        let currentEditTaskId = null;

        function openEditModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            currentEditTaskId = taskId;
            document.getElementById('edit-task-title').value = task.text;
            document.getElementById('edit-task-desc').value = task.description || '';
            
            // 準備分類選單
            const select = document.getElementById('edit-task-category');
            select.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.name; opt.textContent = cat.name;
                select.appendChild(opt);
            });
            select.value = task.category;

            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('edit-modal-content');
            modal.classList.remove('hidden'); void modal.offsetWidth;
            modal.classList.remove('opacity-0'); content.classList.remove('scale-95');
            lucide.createIcons();
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('edit-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                currentEditTaskId = null;
            }, 300);
        }

        function saveEditedTask() {
            if (!currentEditTaskId) return;
            const title = document.getElementById('edit-task-title').value.trim();
            const desc = document.getElementById('edit-task-desc').value.trim();
            const category = document.getElementById('edit-task-category').value;
            
            if (title === '') { showToast('請輸入任務標題！', false); return; }
            
            const taskIndex = tasks.findIndex(t => t.id === currentEditTaskId);
            if (taskIndex !== -1) {
                tasks[taskIndex].text = title;
                tasks[taskIndex].description = desc;
                tasks[taskIndex].category = category;
                saveData();
                closeEditModal();
                showToast('任務已更新！');
            }
        }

        // --- 匯出功能 ---
        function exportReport() {
            const currentTasks = tasks.filter(t => t.date === selectedDateStr);
            const doneTasks = currentTasks.filter(t => t.status === 'done');
            const inprogressTasks = currentTasks.filter(t => t.status === 'inprogress');
            const todoTasks = currentTasks.filter(t => t.status === 'todo');

            const formatTask = (t) => {
                let text = ` - [${t.category}] ${t.text}`;
                if (t.description) {
                    text += `\n   備註: ${t.description.replace(/\n/g, '\n   ')}`;
                }
                return text + '\n';
            };

            let report = `📅 工作日誌：${selectedDateStr}\n\n`;
            
            report += `✅ 【已完成】(${doneTasks.length})\n`;
            doneTasks.forEach(t => report += formatTask(t));
            if (doneTasks.length === 0) report += ` - 無\n`;
            
            report += `\n🚀 【進行中】(${inprogressTasks.length})\n`;
            inprogressTasks.forEach(t => report += formatTask(t));
            if (inprogressTasks.length === 0) report += ` - 無\n`;

            report += `\n📌 【待辦項目】(${todoTasks.length})\n`;
            todoTasks.forEach(t => report += formatTask(t));
            if (todoTasks.length === 0) report += ` - 無\n`;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(report).then(() => showToast('報表已複製到剪貼簿！')).catch(err => fallbackCopy(report));
            } else { fallbackCopy(report); }
        }

        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text; ta.style.position = "fixed"; document.body.appendChild(ta);
            ta.focus(); ta.select();
            try { document.execCommand('copy'); showToast('報表已複製到剪貼簿！'); } 
            catch (err) { showToast('複製失敗，請手動複製', false); }
            document.body.removeChild(ta);
        }

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            const icon = toast.querySelector('i');
            icon.setAttribute('data-lucide', isSuccess ? 'check-circle-2' : 'x-circle');
            icon.className = isSuccess ? 'text-brand-400' : 'text-red-400';
            lucide.createIcons();
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
