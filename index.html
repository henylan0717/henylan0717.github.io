<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢光的工作看板 (雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .task-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .task-card.can-drag {
            cursor: grab;
        }
        .task-card.can-drag:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        .task-card.dragging {
            opacity: 0.5;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .column-drop-zone {
            min-height: 150px;
            transition: background-color 0.2s ease;
        }
        .column-drop-zone.drag-over {
            background-color: #e2e8f0;
            border: 2px dashed #94a3b8;
            border-radius: 0.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        body.unlocked .admin-only-block {
            display: block;
        }
        .admin-only-block {
            display: none;
        }
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
        /* 自訂複選框顏色 */
        .subtask-cb {
            accent-color: #14b8a6; /* brand-500 */
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- 頂部導覽 -->
    <header class="bg-white shadow-sm px-6 py-4 flex flex-col sm:flex-row justify-between items-center z-10 shrink-0 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-brand-500 text-white p-2 rounded-lg relative">
                <i data-lucide="calendar-days"></i>
                <div id="sync-dot" class="absolute -top-1 -right-1 w-3 h-3 bg-slate-400 rounded-full border-2 border-white transition-colors duration-300"></div>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    漢光的工作看板
                    <button id="lock-btn" class="text-slate-400 hover:text-brand-600 transition-colors p-1" title="點擊切換權限">
                        <span id="lock-icon-container">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                    </button>
                </h1>
                <p id="sync-status-text" class="text-xs text-slate-500 font-medium">連線中...</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <button id="export-btn" class="flex-1 sm:flex-none flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors text-sm justify-center">
                <i data-lucide="clipboard-copy" class="w-4 h-4"></i>
                <span>匯出單日報表</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 overflow-auto p-4 sm:p-6 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 shrink-0 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <button id="prev-month-btn" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="calendar-month-year" class="font-bold text-slate-700 text-sm italic">載入中...</h2>
                    <button id="next-month-btn" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="calendar-grid text-center text-xs font-medium text-slate-400 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
                <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                    <button id="today-btn" class="text-xs font-medium text-brand-600 hover:text-brand-700 bg-brand-50 px-3 py-1.5 rounded">回到今天</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-4 h-4 text-brand-500"></i> 進度
                </h3>
                <div class="flex justify-between text-2xl font-bold mb-1">
                    <span id="progress-text" class="text-brand-600 text-lg">0%</span>
                    <span id="task-count-text" class="text-slate-400 text-sm font-medium self-end mb-1">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-brand-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col min-w-0">
            <div class="mb-6">
                <h2 id="selected-date-title" class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"></h2>
                
                <div class="admin-only-block bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-4">
                    <div class="flex flex-col xl:flex-row gap-3">
                        <div class="flex-1 flex flex-col gap-2">
                            <input type="text" id="task-input" placeholder="這天要做什麼？ (Enter 快速新增)" class="w-full pl-4 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                            
                            <!-- 新增子項目區塊 (移到備註上方) -->
                            <div class="bg-slate-50 border border-slate-200 rounded-lg p-3 flex flex-col gap-2 mt-1">
                                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">子項目 (Checklist)</span>
                                <div id="new-subtask-list" class="flex flex-col gap-1.5 max-h-32 overflow-y-auto no-scrollbar"></div>
                                <div class="flex gap-2">
                                    <input type="text" id="new-subtask-input" placeholder="新增可勾選的子項目..." class="flex-1 px-3 py-1.5 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none text-sm">
                                    <button type="button" id="add-new-subtask-btn" class="px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 text-sm font-medium transition-colors shrink-0">新增</button>
                                </div>
                            </div>

                            <!-- 備註區塊 (移到最下方) -->
                            <textarea id="task-desc-input" placeholder="備註 (選填)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none resize-none h-12"></textarea>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <select id="category-input" class="px-3 bg-slate-50 border border-slate-200 rounded-lg text-sm"></select>
                            <button id="manage-category-btn" class="px-3 bg-slate-50 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-100 flex items-center justify-center" title="管理分類">
                                <i data-lucide="settings-2" class="w-4 h-4"></i>
                            </button>
                            <button id="add-task-btn" class="bg-brand-500 text-white px-4 rounded-lg font-medium text-sm">新增</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 lg:gap-6 flex-1 min-h-0">
                <div class="flex-1 flex flex-col bg-slate-100 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-slate-700 text-xs">待辦</h3><span id="count-todo" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="todo" data-status="todo"></div>
                </div>
                <div class="flex-1 flex flex-col bg-blue-50 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-blue-800 text-xs">進行中</h3><span id="count-inprogress" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="inprogress" data-status="inprogress"></div>
                </div>
                <div class="flex-1 flex flex-col bg-brand-50 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-brand-800 text-xs">已完成</h3><span id="count-done" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="done" data-status="done"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 分類管理對話框 -->
    <div id="category-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col max-h-[80vh]">
            <div class="px-5 py-4 border-b flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="tags" class="text-brand-500 w-5 h-5"></i> 管理分類</h3>
                <button id="close-category-modal" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto">
                <ul id="category-list" class="flex flex-col gap-2"></ul>
            </div>
            <div class="p-5 border-t bg-slate-50 shrink-0">
                <h4 class="text-sm font-bold mb-3 flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> 新增</h4>
                <input type="text" id="new-category-name" placeholder="分類名稱" class="w-full px-3 py-2 bg-white border rounded-lg mb-3 text-sm outline-none">
                <div class="flex flex-wrap gap-2 mb-3" id="color-picker"></div>
                <button id="add-category-btn" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm transition-colors hover:bg-slate-900">新增分類</button>
            </div>
        </div>
    </div>

    <!-- 編輯任務對話框 -->
    <div id="edit-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="edit" class="text-brand-500 w-5 h-5"></i> 編輯任務
                </h3>
                <button id="edit-cancel-top" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">任務標題</label>
                <input type="text" id="edit-task-title" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none mb-4">
                
                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">任務日期</label>
                <input type="date" id="edit-task-date" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none mb-4">
                
                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">工作分類</label>
                <select id="edit-task-category" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none mb-4"></select>
                
                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">子項目 (Checklist)</label>
                <div id="edit-subtask-list" class="flex flex-col gap-2 mb-2 max-h-32 overflow-y-auto no-scrollbar">
                    <!-- 子項目列表將由 JS 生成 -->
                </div>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="new-edit-subtask-input" placeholder="新增可勾選的子項目..." class="flex-1 px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none text-sm">
                    <button type="button" id="add-edit-subtask-btn" class="px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 text-sm font-medium transition-colors shrink-0">新增</button>
                </div>

                <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">備註</label>
                <textarea id="edit-task-desc" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none resize-none h-20"></textarea>
            </div>
            <div class="p-4 border-t bg-slate-50 flex gap-3 shrink-0">
                <button id="edit-cancel" class="flex-1 py-2 text-sm font-medium text-slate-500 bg-slate-200 hover:bg-slate-300 rounded-lg transition-colors">取消</button>
                <button id="edit-confirm" class="flex-1 py-2 text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors shadow-sm">儲存</button>
            </div>
        </div>
    </div>

    <!-- 密碼輸入對話框 -->
    <div id="pwd-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden p-6 transform transition-all">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="shield-check" class="text-brand-500"></i> 權限驗證
            </h3>
            <p class="text-sm text-slate-500 mb-4">請輸入管理金鑰以取得編輯權限。</p>
            <input type="password" id="pwd-input" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none mb-4" placeholder="管理密碼">
            <div class="flex gap-3">
                <button id="pwd-cancel" class="flex-1 py-2 text-sm font-medium text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">取消</button>
                <button id="pwd-confirm" class="flex-1 py-2 text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors shadow-sm">確認</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示 -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50 text-sm">
        <span id="toast-icon-container"></span>
        <span id="toast-message">訊息</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC5A4ypI6fKWsRzI-BTsl4ANVXBMKs1b6c",
            authDomain: "henryjob-dedc8.firebaseapp.com",
            projectId: "henryjob-dedc8",
            storageBucket: "henryjob-dedc8.firebasestorage.app",
            messagingSenderId: "1011435018124",
            appId: "1:1011435018124:web:b58d955d5a1b5d30e2a8a9",
            measurementId: "G-J43KCXFF1R"
        };
        const ADMIN_KEY = "1234"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 2. 狀態管理 ---
        let tasks = [];
        let categories = [];
        let isUnlocked = false; 
        let displayDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];
        let currentEditTaskId = null;
        let currentEditSubtasks = []; // 用於在編輯視窗中暫存子項目
        let newSubtasks = []; // 用於在新增任務時暫存子項目
        let sortableInstances = []; // 儲存拖曳實例

        const colorThemes = [
            { value: 'purple', class: 'bg-purple-100 text-purple-700 border-purple-200', dotClass: 'bg-purple-500 ring-purple-500' },
            { value: 'blue', class: 'bg-blue-100 text-blue-700 border-blue-200', dotClass: 'bg-blue-500 ring-blue-500' },
            { value: 'emerald', class: 'bg-emerald-100 text-emerald-700 border-emerald-200', dotClass: 'bg-emerald-500 ring-emerald-500' },
            { value: 'amber', class: 'bg-amber-100 text-amber-700 border-amber-200', dotClass: 'bg-amber-500 ring-amber-500' },
            { value: 'rose', class: 'bg-rose-100 text-rose-700 border-rose-200', dotClass: 'bg-rose-500 ring-rose-500' },
            { value: 'slate', class: 'bg-slate-100 text-slate-700 border-slate-200', dotClass: 'bg-slate-500 ring-slate-500' }
        ];
        let selectedNewCategoryColor = colorThemes[0];

        // --- 3. 核心工具函數 ---

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                if (document.execCommand('copy')) showToast("已成功複製到剪貼簿");
                else showToast("複製失敗", false);
            } catch (err) { showToast("瀏覽器不支援複製功能", false); }
            document.body.removeChild(textArea);
        };

        const showToast = (msg, isSuccess = true) => {
            const t = document.getElementById('toast');
            if(!t) return;
            document.getElementById('toast-message').textContent = msg;
            const container = document.getElementById('toast-icon-container');
            if(container) {
                container.innerHTML = `<i data-lucide="${isSuccess ? 'check-circle-2' : 'x-circle'}" class="${isSuccess ? 'text-brand-400' : 'text-red-400'}"></i>`;
                if(window.lucide) lucide.createIcons();
            }
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        };

        const updateLockUI = () => {
            const container = document.getElementById('lock-icon-container');
            const btn = document.getElementById('lock-btn');
            if (container && btn) {
                container.innerHTML = `<i data-lucide="${isUnlocked ? 'unlock' : 'lock'}" class="w-5 h-5"></i>`;
                if (isUnlocked) {
                    btn.classList.add('text-brand-600');
                    document.body.classList.add('unlocked');
                    btn.title = "管理員模式：已解鎖";
                } else {
                    btn.classList.remove('text-brand-600');
                    document.body.classList.remove('unlocked');
                    btn.title = "點擊輸入金鑰以編輯";
                }
                if(window.lucide) lucide.createIcons();
            }
            
            // 更新拖曳權限
            if (sortableInstances.length > 0) {
                sortableInstances.forEach(s => s.option("disabled", !isUnlocked));
            }
        };

        const refreshView = () => {
            renderCalendar();
            updateUI();
        };

        // --- 4. 資料庫操作 ---

        const renderNewSubtasks = () => {
            const list = document.getElementById('new-subtask-list');
            if (!list) return;
            if (newSubtasks.length === 0) {
                list.innerHTML = '';
                return;
            }
            list.innerHTML = newSubtasks.map(st => `
                <div class="flex justify-between items-center bg-white p-1.5 rounded border border-slate-200 shadow-sm text-sm">
                    <span class="truncate flex-1 text-slate-700 ml-1">${st.text}</span>
                    <button type="button" class="text-slate-300 hover:text-red-500 p-1 del-new-subtask" data-id="${st.id}">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join('');
            list.querySelectorAll('.del-new-subtask').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    newSubtasks = newSubtasks.filter(x => x.id !== id);
                    renderNewSubtasks();
                });
            });
            if(window.lucide) lucide.createIcons();
        };

        const addTask = async () => {
            if (!isUnlocked) return showToast("無編輯權限", false);
            const input = document.getElementById('task-input');
            const txt = input.value.trim();
            if(!txt) return;
            const id = 'task_' + Date.now();
            try {
                await setDoc(doc(db, 'tasks', id), { 
                    id, 
                    text: txt, 
                    description: document.getElementById('task-desc-input').value, 
                    category: document.getElementById('category-input').value || '一般', 
                    status: 'todo', 
                    date: selectedDateStr, 
                    subtasks: [...newSubtasks], // 帶入新增時的子項目
                    timestamp: Date.now() 
                });
                input.value = ''; 
                document.getElementById('task-desc-input').value = '';
                newSubtasks = []; // 清空暫存
                renderNewSubtasks(); // 重新渲染清空後的列表
                showToast("任務已新增");
            } catch(e) { showToast("儲存失敗", false); }
        };

        const deleteTask = async (id) => {
            if (!isUnlocked) return;
            try { await deleteDoc(doc(db, 'tasks', id)); showToast("任務已刪除"); } 
            catch(e) { showToast("刪除失敗", false); }
        };

        const updateTaskStatus = async (id, s) => {
            if (!isUnlocked) return;
            const t = tasks.find(x => x.id === id);
            if(t) await setDoc(doc(db, 'tasks', id), {...t, status: s});
        };

        const deleteCategory = async (id) => {
            if (!isUnlocked) return;
            if (categories.length <= 1) return showToast("至少保留一個分類", false);
            try { await deleteDoc(doc(db, 'categories', id)); showToast("分類已刪除"); } 
            catch(e) { showToast("刪除失敗", false); }
        };

        // --- 5. 畫面渲染邏輯 ---

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const monthYearEl = document.getElementById('calendar-month-year');
            if (!grid || !monthYearEl) return;
            
            grid.innerHTML = '';
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            monthYearEl.textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            
            for (let i = 1; i <= totalDays; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isActive = dateStr === selectedDateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const hasTask = dayTasks.length > 0;
                const isDone = hasTask && dayTasks.every(t => t.status === 'done');
                
                const cell = document.createElement('div');
                cell.className = `p-1 cursor-pointer flex flex-col items-center justify-center rounded-lg min-h-[40px] transition-colors ${isActive ? 'bg-brand-500 text-white shadow-sm' : 'hover:bg-slate-100'}`;
                cell.onclick = () => { selectedDateStr = dateStr; refreshView(); };
                cell.innerHTML = `
                    <span class="text-xs font-medium">${i}</span>
                    ${hasTask ? `<div class="w-1 h-1 rounded-full mt-0.5 ${isActive ? 'bg-white' : (isDone ? 'bg-brand-500' : 'bg-slate-300')}"></div>` : ''}
                `;
                grid.appendChild(cell);
            }
        }

        function updateUI() {
            const title = document.getElementById('selected-date-title');
            if(title) title.textContent = selectedDateStr;
            
            const currentTasks = tasks.filter(t => t.date === selectedDateStr);
            const cols = { todo: document.getElementById('todo'), inprogress: document.getElementById('inprogress'), done: document.getElementById('done') };
            
            Object.values(cols).forEach(c => { if(c) c.innerHTML = ''; });
            let counts = { todo: 0, inprogress: 0, done: 0 };
            
            currentTasks.sort((a,b) => b.timestamp - a.timestamp).forEach(t => {
                if(cols[t.status]) {
                    counts[t.status]++;
                    cols[t.status].appendChild(createTaskCard(t));
                }
            });
            
            ['todo', 'inprogress', 'done'].forEach(s => {
                const el = document.getElementById('count-' + s);
                if(el) el.textContent = counts[s];
            });
            
            const total = currentTasks.length;
            const pct = total === 0 ? 0 : Math.round((counts.done / total) * 100);
            const pb = document.getElementById('progress-bar');
            const pt = document.getElementById('progress-text');
            const tct = document.getElementById('task-count-text');
            if(pb) pb.style.width = pct + '%';
            if(pt) pt.textContent = pct + '%';
            if(tct) tct.textContent = `${counts.done} / ${total}`;
            
            if(window.lucide) lucide.createIcons();
        }

        function createTaskCard(t) {
            const card = document.createElement('div');
            card.className = `task-card bg-white p-3 rounded-lg shadow-sm border border-slate-100 mb-2 group relative ${isUnlocked ? 'can-drag' : ''}`;
            card.dataset.id = t.id; // 供 SortableJS 辨識任務 ID
            
            const catInfo = categories.find(c => c.name === t.category);
            const colorClass = catInfo ? catInfo.colorClass : 'bg-slate-100 text-slate-500 border-slate-200';

            // 處理子項目的 HTML
            const subtasksHtml = (t.subtasks && t.subtasks.length > 0) ? `
                <div class="mt-2 space-y-1.5 border-t border-slate-100 pt-2">
                    ${t.subtasks.map(st => `
                        <label class="flex items-start gap-2 text-xs text-slate-600 ${isUnlocked ? 'cursor-pointer hover:text-slate-800' : 'cursor-default'}">
                            <input type="checkbox" class="subtask-cb mt-0.5 subtask-cb w-3.5 h-3.5 rounded border-slate-300" data-stid="${st.id}" ${st.isCompleted ? 'checked' : ''} ${!isUnlocked ? 'disabled' : ''}>
                            <span class="flex-1 ${st.isCompleted ? 'line-through text-slate-400' : ''}">${st.text}</span>
                        </label>
                    `).join('')}
                </div>
            ` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[9px] px-1.5 py-0.5 rounded uppercase font-bold border ${colorClass}">${t.category}</span>
                    ${isUnlocked ? `
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button class="edit-btn text-slate-300 hover:text-blue-500 p-0.5" title="編輯任務與子項目"><i data-lucide="edit-2" class="w-3 h-3"></i></button>
                            <button class="delete-btn text-slate-300 hover:text-red-500 p-0.5"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                    ` : ''}
                </div>
                <p class="text-sm font-medium ${t.status === 'done' ? 'line-through text-slate-400' : ''}">${t.text}</p>
                ${subtasksHtml}
                ${t.description ? `<p class="text-[10px] text-slate-400 mt-2 bg-slate-50 p-1.5 rounded whitespace-pre-wrap">${t.description}</p>` : ''}
            `;
            
            if(isUnlocked) {
                const delBtn = card.querySelector('.delete-btn');
                if(delBtn) delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(t.id); });

                const editBtn = card.querySelector('.edit-btn');
                if(editBtn) editBtn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(t.id); });

                // 綁定子項目勾選事件
                card.querySelectorAll('.subtask-cb').forEach(cb => {
                    cb.addEventListener('change', async (e) => {
                        e.stopPropagation();
                        const stid = e.target.dataset.stid;
                        const sub = t.subtasks.find(x => x.id === stid);
                        if (sub) {
                            sub.isCompleted = e.target.checked;
                            // 本地畫面即時更新
                            const span = e.target.nextElementSibling;
                            if (sub.isCompleted) span.classList.add('line-through', 'text-slate-400');
                            else span.classList.remove('line-through', 'text-slate-400');
                            
                            // 更新至資料庫
                            try { await setDoc(doc(db, 'tasks', t.id), t); } 
                            catch(err) { showToast("更新子項目失敗", false); }
                        }
                    });
                    cb.addEventListener('click', e => e.stopPropagation()); // 防止點擊勾選時觸發其他事件
                });
            }
            return card;
        }

        function renderCategoryList() {
            const list = document.getElementById('category-list');
            if (!list) return;
            list.innerHTML = '';
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-3 rounded-lg border border-slate-200 bg-white shadow-sm";
                li.innerHTML = `
                    <span class="text-xs font-semibold px-2.5 py-1.5 rounded-md border ${cat.colorClass}">${cat.name}</span>
                    <button class="del-cat-btn text-slate-400 hover:text-red-500 p-1.5"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                `;
                const delBtn = li.querySelector('.del-cat-btn');
                if(delBtn) delBtn.addEventListener('click', () => deleteCategory(cat.id));
                list.appendChild(li);
            });
            if(window.lucide) lucide.createIcons();
        }

        function renderColorPicker() {
            const picker = document.getElementById('color-picker');
            if(!picker) return;
            picker.innerHTML = '';
            colorThemes.forEach(theme => {
                const btn = document.createElement('button');
                const isSelected = selectedNewCategoryColor.value === theme.value;
                btn.className = `w-6 h-6 rounded-full cursor-pointer transition-all ${theme.dotClass.split(' ')[0]} ${isSelected ? 'ring-2 ring-offset-2 ' + theme.dotClass.split(' ')[1] : ''}`;
                btn.addEventListener('click', () => { selectedNewCategoryColor = theme; renderColorPicker(); });
                picker.appendChild(btn);
            });
        }

        // --- 6. 模態框(Modal)控制 ---

        const renderEditSubtasks = () => {
            const list = document.getElementById('edit-subtask-list');
            if (!list) return;
            
            if (currentEditSubtasks.length === 0) {
                list.innerHTML = `<p class="text-xs text-slate-400 text-center py-2">尚未新增子項目</p>`;
                return;
            }

            list.innerHTML = currentEditSubtasks.map(st => `
                <div class="flex justify-between items-center bg-white p-2 rounded border border-slate-200 shadow-sm">
                    <span class="text-sm truncate flex-1 ${st.isCompleted ? 'line-through text-slate-400' : 'text-slate-700'}">${st.text}</span>
                    <button type="button" class="text-slate-300 hover:text-red-500 p-1 del-edit-subtask" data-id="${st.id}">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join('');
            
            list.querySelectorAll('.del-edit-subtask').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    currentEditSubtasks = currentEditSubtasks.filter(x => x.id !== id);
                    renderEditSubtasks();
                });
            });
            if(window.lucide) lucide.createIcons();
        };

        const openEditModal = (id) => {
            const t = tasks.find(x => x.id === id);
            if(!t) return;
            currentEditTaskId = id;
            document.getElementById('edit-task-title').value = t.text;
            document.getElementById('edit-task-desc').value = t.description || '';
            document.getElementById('edit-task-date').value = t.date;
            
            const sel = document.getElementById('edit-task-category');
            if(sel) {
                sel.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                sel.value = t.category;
            }

            // 複製並渲染該任務的子項目
            currentEditSubtasks = t.subtasks ? JSON.parse(JSON.stringify(t.subtasks)) : [];
            document.getElementById('new-edit-subtask-input').value = '';
            renderEditSubtasks();

            document.getElementById('edit-modal').classList.remove('hidden');
        };

        const closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
            currentEditTaskId = null;
            currentEditSubtasks = [];
        };

        const saveEditedTask = async () => {
            if(!currentEditTaskId || !isUnlocked) return;
            const txt = document.getElementById('edit-task-title').value.trim();
            if(!txt) return showToast("標題不可為空白", false);
            
            const t = tasks.find(x => x.id === currentEditTaskId);
            if(t) {
                t.text = txt;
                t.description = document.getElementById('edit-task-desc').value.trim();
                t.category = document.getElementById('edit-task-category').value;
                t.date = document.getElementById('edit-task-date').value;
                t.subtasks = currentEditSubtasks; // 儲存編輯後的子項目
                
                try {
                    await setDoc(doc(db, 'tasks', t.id), t);
                    closeEditModal();
                    showToast("已儲存變更");
                } catch(e) { showToast("儲存失敗", false); }
            }
        };

        // --- 7. 事件監聽與初始化 ---

        function setupEventListeners() {
            // 鎖頭與密碼框
            const pwdModal = document.getElementById('pwd-modal');
            const pwdInput = document.getElementById('pwd-input');

            document.getElementById('lock-btn').addEventListener('click', () => {
                if (isUnlocked) {
                    isUnlocked = false;
                    localStorage.removeItem('is_hankuang_unlocked');
                    updateLockUI();
                    updateUI();
                    showToast("已鎖定編輯權限");
                } else {
                    pwdModal.classList.remove('hidden');
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            });

            document.getElementById('pwd-cancel').addEventListener('click', () => pwdModal.classList.add('hidden'));
            
            document.getElementById('pwd-confirm').addEventListener('click', () => {
                if (pwdInput.value === ADMIN_KEY) {
                    isUnlocked = true;
                    localStorage.setItem('is_hankuang_unlocked', 'true');
                    updateLockUI();
                    updateUI();
                    pwdModal.classList.add('hidden');
                    showToast("驗證成功，管理權限已啟用");
                } else {
                    showToast("密碼錯誤", false);
                }
            });

            pwdInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('pwd-confirm').click(); });

            // 編輯任務對話框
            document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
            document.getElementById('edit-cancel-top').addEventListener('click', closeEditModal);
            document.getElementById('edit-confirm').addEventListener('click', saveEditedTask);

            // 編輯視窗：新增子項目按鈕
            document.getElementById('add-edit-subtask-btn').addEventListener('click', () => {
                const input = document.getElementById('new-edit-subtask-input');
                const txt = input.value.trim();
                if(!txt) return;
                currentEditSubtasks.push({ 
                    id: 'sub_' + Date.now() + Math.random().toString(36).substr(2,5), 
                    text: txt, 
                    isCompleted: false 
                });
                input.value = '';
                renderEditSubtasks();
            });
            document.getElementById('new-edit-subtask-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault(); 
                    document.getElementById('add-edit-subtask-btn').click();
                }
            });

            // 主畫面：新增子項目按鈕
            document.getElementById('add-new-subtask-btn').addEventListener('click', () => {
                const input = document.getElementById('new-subtask-input');
                const txt = input.value.trim();
                if(!txt) return;
                newSubtasks.push({ 
                    id: 'sub_' + Date.now() + Math.random().toString(36).substr(2,5), 
                    text: txt, 
                    isCompleted: false 
                });
                input.value = '';
                renderNewSubtasks();
            });
            document.getElementById('new-subtask-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault(); 
                    document.getElementById('add-new-subtask-btn').click();
                }
            });

            // 分類管理對話框
            document.getElementById('manage-category-btn').addEventListener('click', () => {
                if(!isUnlocked) return showToast("無編輯權限", false);
                renderCategoryList();
                renderColorPicker();
                document.getElementById('category-modal').classList.remove('hidden');
            });
            document.getElementById('close-category-modal').addEventListener('click', () => {
                document.getElementById('category-modal').classList.add('hidden');
            });
            document.getElementById('add-category-btn').addEventListener('click', async () => {
                const input = document.getElementById('new-category-name');
                const name = input.value.trim();
                if(!name) return;
                const newCat = { id: 'cat_' + Date.now(), name, colorClass: selectedNewCategoryColor.class };
                try { await setDoc(doc(db, 'categories', newCat.id), newCat); input.value = ''; } catch(e){}
            });

            // 任務新增與日曆導覽
            document.getElementById('add-task-btn').addEventListener('click', addTask);
            document.getElementById('task-input').addEventListener('keypress', e => { if(e.key === 'Enter') addTask(); });
            
            document.getElementById('today-btn').addEventListener('click', () => { 
                displayDate = new Date(); 
                selectedDateStr = displayDate.toISOString().split('T')[0]; 
                refreshView(); 
            });

            document.getElementById('prev-month-btn').addEventListener('click', () => { displayDate.setMonth(displayDate.getMonth() - 1); refreshView(); });
            document.getElementById('next-month-btn').addEventListener('click', () => { displayDate.setMonth(displayDate.getMonth() + 1); refreshView(); });
            
            // 報表匯出 (調整輸出順序：標題 -> 子項目 -> 備註)
            document.getElementById('export-btn').addEventListener('click', () => {
                const dayTasks = tasks.filter(t => t.date === selectedDateStr);
                const report = `📅 ${selectedDateStr} 工作日誌\n\n` + 
                    dayTasks.map(t => {
                        let res = `[${t.status === 'done' ? '完成' : t.status === 'inprogress' ? '進行中' : '待辦'}] ${t.text}`;
                        if (t.subtasks && t.subtasks.length > 0) {
                            res += '\n' + t.subtasks.map(st => `    ${st.isCompleted ? '[x]' : '[ ]'} ${st.text}`).join('\n');
                        }
                        if (t.description) {
                            res += `\n    備註: ${t.description.replace(/\n/g, '\n    ')}`;
                        }
                        return res;
                    }).join('\n\n');
                copyToClipboard(report);
            });

            // 拖曳區設定 (改用 SortableJS 支援手機觸控)
            document.querySelectorAll('.column-drop-zone').forEach(z => {
                const sortable = new Sortable(z, {
                    group: 'kanban',
                    animation: 150,
                    delay: 200, // 手機需長按 0.2 秒觸發拖曳，防止上下滑動頁面時誤觸
                    delayOnTouchOnly: true,
                    fallbackTolerance: 5,
                    disabled: !isUnlocked,
                    ghostClass: 'opacity-40',
                    onEnd: (evt) => {
                        const id = evt.item.dataset.id;
                        const newStatus = evt.to.dataset.status;
                        const oldStatus = evt.from.dataset.status;
                        // 若移到不同區塊才更新狀態
                        if (id && newStatus && newStatus !== oldStatus) {
                            updateTaskStatus(id, newStatus);
                        }
                    }
                });
                sortableInstances.push(sortable);
            });
        }

        const startApp = async () => {
            setupEventListeners();
            
            onAuthStateChanged(auth, u => {
                if(u) {
                    onSnapshot(collection(db, 'tasks'), s => {
                        tasks = s.docs.map(d => d.data());
                        refreshView();
                    });
                    
                    onSnapshot(collection(db, 'categories'), s => {
                        categories = s.docs.map(d => d.data());
                        const sel = document.getElementById('category-input');
                        if(sel) sel.innerHTML = categories.length ? categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('') : '<option value="一般">一般</option>';
                        // 如果分類管理框是開著的，也即時更新它
                        if(!document.getElementById('category-modal').classList.contains('hidden')) {
                            renderCategoryList();
                        }
                    });
                    
                    const dot = document.getElementById('sync-dot');
                    const syncText = document.getElementById('sync-status-text');
                    if(dot) dot.className = "absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white";
                    if(syncText) syncText.textContent = "雲端即時同步中";
                }
            });

            try { await signInAnonymously(auth); } catch(e) { showToast("連線失敗，請檢查網路", false); }

            if (localStorage.getItem('is_hankuang_unlocked') === 'true') {
                isUnlocked = true;
            }
            updateLockUI();
            refreshView();
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startApp);
        } else {
            startApp();
        }

    </script>
</body>
</html>
