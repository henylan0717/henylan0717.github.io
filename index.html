<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢光的工作看板 (雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .task-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .task-card.can-drag {
            cursor: grab;
        }
        .task-card.can-drag:active {
            cursor: grabbing;
            transform: scale(0.98);
        }
        .task-card.dragging {
            opacity: 0.5;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .column-drop-zone {
            min-height: 150px;
            transition: background-color 0.2s ease;
        }
        .column-drop-zone.drag-over {
            background-color: #e2e8f0;
            border: 2px dashed #94a3b8;
            border-radius: 0.5rem;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        body.unlocked .admin-only-block {
            display: block;
        }
        .admin-only-block {
            display: none;
        }
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- 頂部導覽 -->
    <header class="bg-white shadow-sm px-6 py-4 flex flex-col sm:flex-row justify-between items-center z-10 shrink-0 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-brand-500 text-white p-2 rounded-lg relative">
                <i data-lucide="calendar-days"></i>
                <div id="sync-dot" class="absolute -top-1 -right-1 w-3 h-3 bg-slate-400 rounded-full border-2 border-white transition-colors duration-300"></div>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    漢光的工作看板
                    <button id="lock-btn" class="text-slate-400 hover:text-brand-600 transition-colors p-1" title="點擊切換權限">
                        <span id="lock-icon-container">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                    </button>
                </h1>
                <p id="sync-status-text" class="text-xs text-slate-500 font-medium">連線中...</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 w-full sm:w-auto">
            <button id="export-btn" class="flex-1 sm:flex-none flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition-colors text-sm justify-center">
                <i data-lucide="clipboard-copy" class="w-4 h-4"></i>
                <span>匯出單日報表</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 overflow-auto p-4 sm:p-6 flex flex-col lg:flex-row gap-6">
        
        <aside class="w-full lg:w-80 shrink-0 flex flex-col gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <button id="prev-month-btn" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="calendar-month-year" class="font-bold text-slate-700 text-sm italic">載入中...</h2>
                    <button id="next-month-btn" class="p-1 hover:bg-slate-100 rounded text-slate-500">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="calendar-grid text-center text-xs font-medium text-slate-400 mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
                <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                    <button id="today-btn" class="text-xs font-medium text-brand-600 hover:text-brand-700 bg-brand-50 px-3 py-1.5 rounded">回到今天</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-4 h-4 text-brand-500"></i> 進度
                </h3>
                <div class="flex justify-between text-2xl font-bold mb-1">
                    <span id="progress-text" class="text-brand-600 text-lg">0%</span>
                    <span id="task-count-text" class="text-slate-400 text-sm font-medium self-end mb-1">0 / 0</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-brand-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col min-w-0">
            <div class="mb-6">
                <h2 id="selected-date-title" class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"></h2>
                <div class="admin-only-block bg-white p-4 rounded-xl shadow-sm border border-slate-100 mb-4">
                    <div class="flex flex-col xl:flex-row gap-3">
                        <div class="flex-1 flex flex-col gap-2">
                            <input type="text" id="task-input" placeholder="這天要做什麼？ (Enter)" class="w-full pl-4 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none">
                            <textarea id="task-desc-input" placeholder="備註 (選填)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none resize-none h-12"></textarea>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <select id="category-input" class="px-3 bg-slate-50 border border-slate-200 rounded-lg text-sm"></select>
                            <button id="add-task-btn" class="bg-brand-500 text-white px-4 rounded-lg font-medium text-sm">新增</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 lg:gap-6 flex-1 min-h-0">
                <div class="flex-1 flex flex-col bg-slate-100 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-slate-700 text-xs">待辦</h3><span id="count-todo" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="todo" data-status="todo"></div>
                </div>
                <div class="flex-1 flex flex-col bg-blue-50 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-blue-800 text-xs">進行中</h3><span id="count-inprogress" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="inprogress" data-status="inprogress"></div>
                </div>
                <div class="flex-1 flex flex-col bg-brand-50 rounded-xl overflow-hidden">
                    <div class="p-3 border-b flex justify-between items-center"><h3 class="font-bold text-brand-800 text-xs">已完成</h3><span id="count-done" class="text-xs">0</span></div>
                    <div class="p-3 flex-1 overflow-y-auto no-scrollbar column-drop-zone" id="done" data-status="done"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- 密碼輸入對話框 -->
    <div id="pwd-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden p-6 transform transition-all">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="shield-check" class="text-brand-500"></i> 權限驗證
            </h3>
            <p class="text-sm text-slate-500 mb-4">請輸入管理金鑰以取得編輯權限。</p>
            <input type="password" id="pwd-input" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none mb-4" placeholder="管理密碼">
            <div class="flex gap-3">
                <button id="pwd-cancel" class="flex-1 py-2 text-sm font-medium text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">取消</button>
                <button id="pwd-confirm" class="flex-1 py-2 text-sm font-medium text-white bg-brand-500 hover:bg-brand-600 rounded-lg transition-colors shadow-sm">確認</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50 text-sm">
        <span id="toast-icon-container"></span>
        <span id="toast-message">訊息</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC5A4ypI6fKWsRzI-BTsl4ANVXBMKs1b6c",
            authDomain: "henryjob-dedc8.firebaseapp.com",
            projectId: "henryjob-dedc8",
            storageBucket: "henryjob-dedc8.firebasestorage.app",
            messagingSenderId: "1011435018124",
            appId: "1:1011435018124:web:b58d955d5a1b5d30e2a8a9",
            measurementId: "G-J43KCXFF1R"
        };
        const ADMIN_KEY = "921886"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 2. 狀態管理 ---
        let tasks = [];
        let categories = [];
        let isUnlocked = false; 
        let displayDate = new Date();
        let selectedDateStr = new Date().toISOString().split('T')[0];

        // --- 3. 核心工具函數 ---

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) showToast("已成功複製到剪貼簿");
                else showToast("複製失敗", false);
            } catch (err) {
                showToast("瀏覽器不支援複製功能", false);
            }
            document.body.removeChild(textArea);
        };

        const showToast = (msg, isSuccess = true) => {
            const t = document.getElementById('toast');
            if(!t) return;
            document.getElementById('toast-message').textContent = msg;
            const container = document.getElementById('toast-icon-container');
            if(container) {
                container.innerHTML = `<i data-lucide="${isSuccess ? 'check-circle-2' : 'x-circle'}" class="${isSuccess ? 'text-brand-400' : 'text-red-400'}"></i>`;
                if(window.lucide) lucide.createIcons();
            }
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        };

        const updateLockUI = () => {
            const container = document.getElementById('lock-icon-container');
            const btn = document.getElementById('lock-btn');
            if (container && btn) {
                const iconName = isUnlocked ? 'unlock' : 'lock';
                container.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i>`;
                if (isUnlocked) {
                    btn.classList.add('text-brand-600');
                    document.body.classList.add('unlocked');
                    btn.title = "管理員模式：已解鎖";
                } else {
                    btn.classList.remove('text-brand-600');
                    document.body.classList.remove('unlocked');
                    btn.title = "點擊輸入金鑰以編輯";
                }
                if(window.lucide) lucide.createIcons();
            }
        };

        const refreshView = () => {
            renderCalendar();
            updateUI();
        };

        // --- 4. 資料庫操作 ---

        const addTask = async () => {
            if (!isUnlocked) return showToast("無編輯權限", false);
            const input = document.getElementById('task-input');
            const txt = input.value.trim();
            if(!txt) return;
            const id = 'task_' + Date.now();
            try {
                await setDoc(doc(db, 'tasks', id), { 
                    id, 
                    text: txt, 
                    description: document.getElementById('task-desc-input').value, 
                    category: document.getElementById('category-input').value || '一般', 
                    status: 'todo', 
                    date: selectedDateStr, 
                    timestamp: Date.now() 
                });
                input.value = ''; 
                document.getElementById('task-desc-input').value = '';
                showToast("任務已新增");
            } catch(e) { showToast("儲存失敗", false); }
        };

        const deleteTask = async (id) => {
            if (!isUnlocked) return;
            try { await deleteDoc(doc(db, 'tasks', id)); showToast("任務已刪除"); } 
            catch(e) { showToast("刪除失敗", false); }
        };

        const updateTaskStatus = async (id, s) => {
            if (!isUnlocked) return;
            const t = tasks.find(x => x.id === id);
            if(t) await setDoc(doc(db, 'tasks', id), {...t, status: s});
        };

        // --- 5. 畫面渲染邏輯 ---

        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            const monthYearEl = document.getElementById('calendar-month-year');
            if (!grid || !monthYearEl) return;
            
            grid.innerHTML = '';
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            monthYearEl.textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
            
            for (let i = 1; i <= totalDays; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isActive = dateStr === selectedDateStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const hasTask = dayTasks.length > 0;
                const isDone = hasTask && dayTasks.every(t => t.status === 'done');
                
                const cell = document.createElement('div');
                cell.className = `p-1 cursor-pointer flex flex-col items-center justify-center rounded-lg min-h-[40px] transition-colors ${isActive ? 'bg-brand-500 text-white shadow-sm' : 'hover:bg-slate-100'}`;
                cell.onclick = () => { selectedDateStr = dateStr; refreshView(); };
                cell.innerHTML = `
                    <span class="text-xs font-medium">${i}</span>
                    ${hasTask ? `<div class="w-1 h-1 rounded-full mt-0.5 ${isActive ? 'bg-white' : (isDone ? 'bg-brand-500' : 'bg-slate-300')}"></div>` : ''}
                `;
                grid.appendChild(cell);
            }
        }

        function updateUI() {
            const title = document.getElementById('selected-date-title');
            if(title) title.textContent = selectedDateStr;
            
            const currentTasks = tasks.filter(t => t.date === selectedDateStr);
            const cols = { todo: document.getElementById('todo'), inprogress: document.getElementById('inprogress'), done: document.getElementById('done') };
            
            Object.values(cols).forEach(c => { if(c) c.innerHTML = ''; });
            let counts = { todo: 0, inprogress: 0, done: 0 };
            
            currentTasks.sort((a,b) => b.timestamp - a.timestamp).forEach(t => {
                if(cols[t.status]) {
                    counts[t.status]++;
                    cols[t.status].appendChild(createTaskCard(t));
                }
            });
            
            ['todo', 'inprogress', 'done'].forEach(s => {
                const el = document.getElementById('count-' + s);
                if(el) el.textContent = counts[s];
            });
            
            const total = currentTasks.length;
            const pct = total === 0 ? 0 : Math.round((counts.done / total) * 100);
            const pb = document.getElementById('progress-bar');
            const pt = document.getElementById('progress-text');
            const tct = document.getElementById('task-count-text');
            if(pb) pb.style.width = pct + '%';
            if(pt) pt.textContent = pct + '%';
            if(tct) tct.textContent = `${counts.done} / ${total}`;
            
            if(window.lucide) lucide.createIcons();
        }

        function createTaskCard(t) {
            const card = document.createElement('div');
            card.className = `task-card bg-white p-3 rounded-lg shadow-sm border border-slate-100 mb-2 group relative ${isUnlocked ? 'can-drag' : ''}`;
            
            if(isUnlocked) {
                card.draggable = true;
                card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('tid', t.id); card.classList.add('opacity-40'); });
                card.addEventListener('dragend', () => card.classList.remove('opacity-40'));
            }
            
            const btnId = `del_btn_${t.id.replace(/\W/g, '')}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[9px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 uppercase font-bold">${t.category}</span>
                    ${isUnlocked ? `<button id="${btnId}" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-3 h-3"></i></button>` : ''}
                </div>
                <p class="text-sm font-medium ${t.status === 'done' ? 'line-through text-slate-400' : ''}">${t.text}</p>
                ${t.description ? `<p class="text-[10px] text-slate-400 mt-1 bg-slate-50 p-1.5 rounded truncate">${t.description}</p>` : ''}
            `;
            
            if(isUnlocked) {
                setTimeout(() => {
                    const btn = document.getElementById(btnId);
                    if(btn) btn.onclick = (e) => { e.stopPropagation(); deleteTask(t.id); };
                }, 0);
            }
            return card;
        }

        // --- 6. 事件監聽與權限對話框 ---

        function setupEventListeners() {
            const pwdModal = document.getElementById('pwd-modal');
            const pwdInput = document.getElementById('pwd-input');
            const lockBtn = document.getElementById('lock-btn');

            lockBtn.addEventListener('click', () => {
                if (isUnlocked) {
                    isUnlocked = false;
                    localStorage.removeItem('is_hankuang_unlocked');
                    updateLockUI();
                    updateUI();
                    showToast("已登出管理員模式");
                } else {
                    pwdModal.classList.remove('hidden');
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            });

            document.getElementById('pwd-cancel').addEventListener('click', () => {
                pwdModal.classList.add('hidden');
            });

            document.getElementById('pwd-confirm').addEventListener('click', () => {
                if (pwdInput.value === ADMIN_KEY) {
                    isUnlocked = true;
                    localStorage.setItem('is_hankuang_unlocked', 'true');
                    updateLockUI();
                    updateUI();
                    pwdModal.classList.add('hidden');
                    showToast("驗證成功，管理權限已啟用");
                } else {
                    showToast("密碼錯誤，請重試", false);
                }
            });

            // 支援 Enter 鍵確認密碼
            pwdInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') document.getElementById('pwd-confirm').click();
            });

            document.getElementById('add-task-btn').addEventListener('click', addTask);
            document.getElementById('task-input').addEventListener('keypress', e => { if(e.key === 'Enter') addTask(); });
            
            document.getElementById('today-btn').addEventListener('click', () => { 
                displayDate = new Date(); 
                selectedDateStr = displayDate.toISOString().split('T')[0]; 
                refreshView(); 
            });

            document.getElementById('prev-month-btn').addEventListener('click', () => { displayDate.setMonth(displayDate.getMonth() - 1); refreshView(); });
            document.getElementById('next-month-btn').addEventListener('click', () => { displayDate.setMonth(displayDate.getMonth() + 1); refreshView(); });
            
            document.getElementById('export-btn').addEventListener('click', () => {
                const dayTasks = tasks.filter(t => t.date === selectedDateStr);
                const report = `📅 ${selectedDateStr} 工作日誌\n` + 
                    dayTasks.map(t => `[${t.status === 'done' ? '完成' : t.status === 'inprogress' ? '進行中' : '待辦'}] ${t.text}${t.description ? ' (' + t.description + ')' : ''}`).join('\n');
                copyToClipboard(report);
            });

            document.querySelectorAll('.column-drop-zone').forEach(z => {
                z.ondragover = e => { e.preventDefault(); if(isUnlocked) z.classList.add('drag-over'); };
                z.ondragleave = () => z.classList.remove('drag-over');
                z.ondrop = e => {
                    e.preventDefault();
                    z.classList.remove('drag-over');
                    if(!isUnlocked) return;
                    const id = e.dataTransfer.getData('tid');
                    if(id) updateTaskStatus(id, z.dataset.status);
                };
            });
        }

        // --- 7. 初始化啟動 ---

        const startApp = async () => {
            setupEventListeners();
            
            onAuthStateChanged(auth, u => {
                if(u) {
                    onSnapshot(collection(db, 'tasks'), s => {
                        tasks = s.docs.map(d => d.data());
                        refreshView();
                    }, (err) => console.error("Snapshot error:", err));
                    
                    onSnapshot(collection(db, 'categories'), s => {
                        categories = s.docs.map(d => d.data());
                        const sel = document.getElementById('category-input');
                        if(sel) sel.innerHTML = categories.length ? categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('') : '<option value="一般">一般</option>';
                    });
                    
                    const dot = document.getElementById('sync-dot');
                    const syncText = document.getElementById('sync-status-text');
                    if(dot) dot.className = "absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white";
                    if(syncText) syncText.textContent = "雲端即時同步中";
                }
            });

            try { await signInAnonymously(auth); } catch(e) { showToast("連線失敗，請檢查網路", false); }

            if (localStorage.getItem('is_hankuang_unlocked') === 'true') {
                isUnlocked = true;
            }
            updateLockUI();
            refreshView();
        };

        // 確保 DOM 載入後才執行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startApp);
        } else {
            startApp();
        }

    </script>
</body>
</html>
