<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍漢光課程總表</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 配置 Tailwind 顏色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {}
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const CourseCatalog = () => {
            const [activeCategory, setActiveCategory] = useState('所有課程');
            const [showLecturer, setShowLecturer] = useState(false);
            const [showPayment, setShowPayment] = useState(false);
            const [expandedCourses, setExpandedCourses] = useState({});

            const toggleCourse = (id) => {
                setExpandedCourses(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            const categories = ['所有課程', '視覺影像', '美感設計', '數位創新'];

            const courses = [
                {
                    id: 1,
                    category: "視覺影像",
                    title: "鏡頭魔法師：手機攝影與活動紀錄",
                    duration: "2小時",
                    image: "01.png?w=800&q=80",
                    video: "", // 留空就會自動顯示上方 image 照片，未來有自己的影片再填入 "./your-video.mp4"
                    content: [
                        "手機鏡頭特性與光線運用 (30min)",
                        "動態捕捉技巧：校慶大隊接力、社團表演動態攝影 (30min)",
                        "活動紀錄企劃：戶外教學或童軍露營的敘事鏡頭拍攝 (1hr)"
                    ],
                    fee: "講師費 2000元/小時 (共4000元)",
                    remarks: "單槍投影機、電腦、學員需自備手機"
                },
                {
                    id: 2,
                    category: "視覺影像",
                    title: "動感教室：Canva 短影音製作",
                    duration: "2小時",
                    image: "02.png?w=800&q=80",
                    video: "",
                    content: [
                        "Canva 影片轉場特效與無版權背景音樂搭配 (30min)",
                        "運鏡技巧與防手震應用概念 (30min)",
                        "實戰產出：製作班級運動會進場或社團招生宣傳短片 (1hr)"
                    ],
                    fee: "講師費 2000元/小時 (共4000元)",
                    remarks: "單槍投影機、電腦、需事先註冊 Canva 帳號"
                },
                {
                    id: 3,
                    category: "美感設計",
                    title: "AI 繪圖大冒險：從靈感到具象",
                    duration: "2小時",
                    image: "03.png?w=800&q=80",
                    video: "",
                    content: [
                        "AI 繪圖詠唱心法與結構化提示詞 (40min)",
                        "班級專屬識別：生成班服圖案草圖與班級精神吉祥物 (40min)",
                        "教學情境輔助：生成歷史事件還原圖或文學情境 3D 視覺 (40min)"
                    ],
                    fee: "講師費 2000元/小時 (共4000元)",
                    remarks: "單槍投影機、電腦、穩定網路環境"
                },
                {
                    id: 4,
                    category: "美感設計",
                    title: "班級經營美學：Canva x AI 實用文創設計",
                    duration: "2小時",
                    image: "04.png?w=800&q=80",
                    video: "",
                    content: [
                        "AI 素材整合與 Canva 排版美學 (30min)",
                        "班級實用文創：設計段考祈福小卡、班級公約海報與幹部名牌 (30min)",
                        "實境合成 (Mockup)：將設計合成至展板、文具或衣服等實體周邊 (1hr)"
                    ],
                    fee: "講師費 2000元/小時 (共4000元)",
                    remarks: "單槍投影機、電腦、需具備 Canva 基礎操作能力"
                },

                    id: 5,
                    category: "數位創新",
                    title: "AI 故事屋：Gemini 創意引導與備課",
                    duration: "2小時",
                    image: "05.png?w=800&q=80",
                    video: "",

                    ],
                    fee: "講師費 2000元/小時 (共4000元)",
                    remarks: "單槍投影機、電腦、Google 帳號"
                }
            ];

            const filteredCourses = activeCategory === '所有課程' 
                ? courses 
                : courses.filter(course => course.category === activeCategory);

            return (
                <div className="min-h-screen pb-16 flex flex-col">

                                        {/* Video/Image Section 智慧切換 */}
                                        <div className="h-52 w-full relative overflow-hidden group bg-gray-100">
                                            <div className="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors duration-300 z-10 pointer-events-none"></div>
                                            
                                            {course.video ? (
                                                <video 
                                                    autoPlay 
                                                    loop 
                                                    muted 
                                                    playsInline
                                                    poster={course.image}
                                                    className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700 ease-out"
                                                    onCanPlay={(e) => e.target.play().catch(() => {})}
                                                >
                                                    <source src={course.video} type="video/mp4" />
                                                </video>
                                            ) : (
                                                <img 
                                                    src={course.image} 
                                                    alt={course.title} 
                                                    referrerPolicy="no-referrer"
                                                    className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700 ease-out"
                                                />
                                            )}
                                            
                                            <span className="absolute top-4 left-4 bg-white/95 backdrop-blur-sm px-3 py-1.5 text-xs font-bold text-purple-700 rounded-lg shadow-sm z-20 border border-purple-100">
                                                {course.category}
                                            </span>
                                        </div>

                                        {/* Content Section */}
                                        <div className="p-6 flex-grow flex flex-col">
                                            <h3 className="text-xl font-bold text-gray-900 mb-3 leading-tight min-h-[3.5rem]">{course.title}</h3>
                                            
                                            <div className="flex items-center text-sm font-medium text-blue-700 bg-blue-50 w-fit px-3 py-1 rounded-md mb-5">
                                                <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                課程時數：{course.duration}
                                            </div>

                                            {/* Collapsible Section */}
                                            <div className={`overflow-hidden transition-all duration-500 ease-in-out ${expandedCourses[course.id] ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                {/* Syllabus Box */}
                                                <div className="bg-gray-50 rounded-xl p-5 mb-6 border border-gray-100 flex-grow">
                                                    <h4 className="text-sm font-bold text-gray-800 mb-3 flex items-center">
                                                        <svg className="w-4 h-4 mr-2 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                                                        課程內容大綱
                                                    </h4>
                                                    <ul className="space-y-2.5">
                                                        {course.content.map((item, index) => (
                                                            <li key={index} className="text-sm text-gray-600 flex items-start leading-relaxed">
                                                                <span className="text-blue-500 mr-2 mt-0.5 text-lg leading-none">•</span>
                                                                <span>{item}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>

                                                {/* Footer Info */}
                                                <div className="space-y-3 text-sm border-t border-gray-100 pt-5 mb-6">
                                                    <div className="flex items-start">
                                                        <span className="font-bold text-gray-700 w-20 shrink-0 bg-gray-100 px-2 py-0.5 rounded text-xs mr-2 text-center">費用說明</span>
                                                        <span className="text-gray-600 pt-0.5">
                                                            {course.fee}
                                                            <span className="block text-xs text-gray-500 mt-1">※ 雙北以外交通費另計</span>
                                                        </span>
                                                    </div>
                                                    <div className="flex items-start">
                                                        <span className="font-bold text-gray-700 w-20 shrink-0 bg-gray-100 px-2 py-0.5 rounded text-xs mr-2 text-center">需求備註</span>
                                                        <span className="text-gray-600 pt-0.5">{course.remarks}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <button 
                                                onClick={() => toggleCourse(course.id)}
                                                className="mt-auto w-full py-2.5 border-2 border-purple-500 text-purple-600 font-bold rounded-lg hover:bg-gradient-to-r hover:from-blue-500 hover:to-purple-600 hover:text-white hover:border-transparent transition-all duration-300 flex justify-center items-center group"
                                            >
                                                {expandedCourses[course.id] ? '收起詳情' : '了解詳情'}
                                                <svg className={`w-4 h-4 ml-1.5 transform transition-transform duration-300 group-hover:text-white ${expandedCourses[course.id] ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Footer Section */}
                    <footer className="mt-16 border-t border-gray-200 py-8 text-center text-gray-500 text-sm">
                        <div className="max-w-6xl mx-auto px-4">
                            <p>© 2026 藍漢光 課程導覽</p>
                            <p className="mt-1 text-gray-400">僅供翰林出版社業務推廣使用</p>
                        </div>
                    </footer>

                    {/* 講師資訊 Modal */}
                    {showLecturer && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity">
                            <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl relative">
                                <button onClick={() => setShowLecturer(false)} className="absolute top-5 right-5 text-gray-400 hover:text-gray-800 transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                <div className="flex items-center mb-6">
                                    <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mr-4">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-900">講師資訊</h2>
                                </div>
                                <div className="space-y-4 text-gray-600">
                                    <p><strong className="text-gray-800 block text-sm mb-1">姓名</strong> <span className="text-lg">藍漢光</span></p>
                                    <p><strong className="text-gray-800 block text-sm mb-1">現任</strong> 真心人設計工作室 創辦人</p>
                                    <div className="text-gray-600">
                                        <strong className="text-gray-800 block text-sm mb-1">簡歷</strong> 
                                        <ul className="list-disc pl-5 mt-1 space-y-1">

                                            <li>阿瘦皮鞋品牌設計</li>

                                            <li>富邦文教基金會特約設計</li>
                                            <li>金馬影展視覺設計</li>

                                            <li>女性影展視覺統籌</li>

                                            <li>度度客校園募資專案講師</li>
                                        </ul>
                                    </div>
                                    <div className="text-gray-600">
                                        <strong className="text-gray-800 block text-sm mb-1">專業證照</strong> 
                                        <ul className="list-disc pl-5 mt-1 space-y-1">
                                            <li>Canva專案教學證照</li>
                                            <li>Gemini Google for Education證照</li>
                                        </ul>
                                    </div>
                                    <div className="text-gray-600">
                                        <strong className="text-gray-800 block text-sm mb-1">聯絡方式</strong> 
                                        <div className="space-y-1 mt-1">
                                            <p>0921-995-886</p>
                                            <p>Line ID: human0717</p>
                                            <p>E-mail: human0717@gmail.com</p>

                            </div>
                        </div>
                    )}

                    {/* 匯款資訊 Modal */}
                    {showPayment && (

                            <div className="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl relative">

                                <div className="text-sm text-purple-600 bg-purple-50 p-3 rounded-lg mt-4 flex items-start">

</body>
</html>
